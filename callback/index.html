<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuickBooks Authorization — Green Pine RC</title>
  <style>
    body { font-family: Georgia, serif; max-width: 720px; margin: 60px auto; padding: 0 24px; color: #222; line-height: 1.7; }
    h1 { font-size: 1.6rem; border-bottom: 1px solid #ddd; padding-bottom: 12px; }
    h2 { font-size: 1.1rem; margin-top: 2rem; }
    .field { background: #f5f5f5; border: 1px solid #ddd; border-radius: 4px; padding: 12px 16px; margin: 8px 0; font-family: monospace; font-size: 0.95rem; word-break: break-all; }
    .copy-btn { margin-left: 12px; font-size: 0.8rem; padding: 2px 10px; cursor: pointer; }
    .error { color: #c00; }
    footer { margin-top: 3rem; font-size: 0.85rem; color: #888; border-top: 1px solid #eee; padding-top: 12px; }
  </style>
</head>
<body>
  <h1>QuickBooks Authorization</h1>
  <div id="content"></div>
  <footer>Green Pine RC &mdash; Internal Tools &mdash; Not for public distribution</footer>

  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    const realmId = params.get('realmId');
    const error = params.get('error');
    const div = document.getElementById('content');

    if (error) {
      div.innerHTML = '<p class="error"><strong>Authorization failed:</strong> ' + error + '</p>';
    } else if (code) {
      div.innerHTML = `
        <p>Authorization successful. Copy the values below and paste them into the terminal when prompted.</p>
        <h2>Authorization Code</h2>
        <div class="field" id="code">${code}</div>
        <button class="copy-btn" onclick="copy('code')">Copy</button>
        <h2>Realm ID (Company ID)</h2>
        <div class="field" id="realm">${realmId || 'Not provided'}</div>
        <button class="copy-btn" onclick="copy('realm')">Copy</button>
        <p style="margin-top:2rem;color:#888;font-size:0.9rem;">You can close this tab once you have pasted both values into the terminal.</p>
      `;
    } else {
      div.innerHTML = '<p class="error">No authorization code found in the URL. This page should only be reached after authorizing via QuickBooks.</p>';
    }

    function copy(id) {
      const text = document.getElementById(id).innerText;
      navigator.clipboard.writeText(text);
    }
  </script>
</body>
</html>
